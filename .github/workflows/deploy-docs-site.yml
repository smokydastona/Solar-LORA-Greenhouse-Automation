name: Deploy Project Docs

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - docs/**
      - .github/copilot-instructions.md
      - .github/workflows/deploy-docs-site.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Publish docs site
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install markdown renderer
        shell: bash
        run: python -m pip install markdown

      - name: Build static docs site from markdown
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path, PurePosixPath
          import markdown
          import re
          import shutil

          repo = Path('.').resolve()
          site = repo / 'site'
          if site.exists():
              shutil.rmtree(site)
          site.mkdir(exist_ok=True)

          sources = [repo / 'README.md'] + sorted((repo / 'docs').glob('*.md')) + [repo / '.github' / 'copilot-instructions.md']
          links = []

          style = """
          :root {
            color-scheme: light;
            --bg: #edf4e8;
            --paper: rgba(255, 255, 255, 0.9);
            --panel: #f6fbf2;
            --text: #213126;
            --muted: #617163;
            --accent: #2d6a3a;
            --accent-soft: #dcead9;
            --line: #cad7c5;
            --shadow: 0 18px 42px rgba(25, 44, 28, 0.12);
          }
          * { box-sizing: border-box; }
          body {
            margin: 0;
            font-family: Georgia, 'Times New Roman', serif;
            background: radial-gradient(circle at top, #f8fbf4 0, #edf4e8 42%, #dfe8d8 100%);
            color: var(--text);
          }
          .shell {
            max-width: 1180px;
            margin: 0 auto;
            padding: 24px 16px 56px;
          }
          .masthead {
            background: linear-gradient(145deg, rgba(31, 55, 36, 0.96), rgba(67, 108, 66, 0.92));
            color: #f4f8ef;
            border-radius: 24px;
            padding: 22px 24px;
            margin-bottom: 18px;
            box-shadow: var(--shadow);
          }
          .masthead h1 {
            margin: 0 0 8px;
            font-size: 2rem;
            color: #f8fbf4;
          }
          .masthead p {
            margin: 0;
            max-width: 72ch;
            line-height: 1.6;
            color: #dce9d8;
          }
          nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 18px;
            padding: 14px;
            background: var(--paper);
            border: 1px solid rgba(202, 215, 197, 0.92);
            border-radius: 18px;
            box-shadow: var(--shadow);
          }
          nav a {
            text-decoration: none;
            color: var(--accent);
            font-weight: 700;
            padding: 8px 12px;
            border-radius: 999px;
            background: var(--accent-soft);
          }
          article {
            background: var(--paper);
            border: 1px solid rgba(202, 215, 197, 0.92);
            border-radius: 24px;
            padding: 28px;
            box-shadow: var(--shadow);
            line-height: 1.7;
          }
          h1, h2, h3 { color: #21412a; }
          a { color: var(--accent); }
          code { background: #edf4e7; padding: 0.1rem 0.35rem; border-radius: 6px; }
          pre {
            background: #1f2b22;
            color: #eef7eb;
            padding: 1rem;
            border-radius: 14px;
            overflow-x: auto;
          }
          pre code { background: transparent; padding: 0; color: inherit; }
          table { border-collapse: collapse; width: 100%; }
          th, td { border: 1px solid var(--line); padding: 0.6rem; text-align: left; }
          th { background: var(--panel); }
          blockquote {
            margin: 1.25rem 0;
            padding: 0.85rem 1rem;
            border-left: 5px solid #6b8d64;
            background: #f4f9f0;
            border-radius: 0 14px 14px 0;
          }
          img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 1.25rem 0;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: #fff;
          }
          @media (max-width: 700px) {
            .shell { padding: 16px 12px 36px; }
            .masthead, article { padding: 18px; }
          }
          """

          def target_name(source: Path) -> str:
              return 'index.html' if source.name == 'README.md' else source.stem.lower() + '.html'

          def normalize_target(target: str, source: Path) -> str:
              normalized = target
              while normalized.startswith('./'):
                  normalized = normalized[2:]

              if source.parent == repo / 'docs':
                  while normalized.startswith('../'):
                      normalized = normalized[3:]

              return normalized

          def rewrite_markdown_links(text: str, source: Path) -> str:
              pattern = re.compile(r'(!?)\[([^\]]+)\]\(([^)]+)\)')

              def replace(match):
                  prefix, label, target = match.groups()
                  if target.startswith(('http://', 'https://', '#', 'mailto:')):
                      return match.group(0)

                  normalized_target = normalize_target(target, source)
                  if prefix == '!':
                      return f'![{label}]({normalized_target})'

                  if normalized_target.lower().endswith('.md'):
                      target_path = PurePosixPath(normalized_target)
                      html_target = 'index.html' if target_path.name.lower() == 'readme.md' else target_path.stem.lower() + '.html'
                      return f'[{label}]({html_target})'

                  return f'[{label}]({normalized_target})'

              return pattern.sub(replace, text)

          for source in sources:
              rel_name = target_name(source)
              links.append((source.stem if source.name != 'README.md' else 'Home', rel_name))

          nav = '<nav>' + ''.join(f'<a href="{href}">{label}</a>' for label, href in links) + '</nav>'

          for item in ('platformio.ini', 'src', 'include', 'test', '.github'):
              source_path = repo / item
              destination_path = site / item
              if source_path.is_dir():
                  shutil.copytree(source_path, destination_path, dirs_exist_ok=True)
              elif source_path.is_file():
                  destination_path.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy2(source_path, destination_path)

          diagrams = repo / 'docs' / 'diagrams'
          if diagrams.exists():
              shutil.copytree(diagrams, site / 'diagrams', dirs_exist_ok=True)

          for source in sources:
              rel_name = target_name(source)
              markdown_source = rewrite_markdown_links(source.read_text(encoding='utf-8'), source)
              html = markdown.markdown(markdown_source, extensions=['tables', 'fenced_code'])
              output = site / rel_name
              output.write_text(
                  f'<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{source.stem}</title><style>{style}</style></head><body><div class="shell"><header class="masthead"><h1>Mini Greenhouse Docs</h1><p>Project documentation for the ESP32-S3 greenhouse controller, local dashboard, telemetry contract, wiring, commissioning, and operating guidance.</p></header>{nav}<article>{html}</article></div></body></html>',
                  encoding='utf-8'
              )
          PY

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
