name: Build Release Bundle

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  content-guard:
    name: Guard against placeholders
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Fail on placeholder text in tracked project files
        shell: bash
        run: |
          set -euo pipefail
          found=0
          while IFS= read -r file; do
            if [ "$file" = ".github/workflows/build-release-bundle.yml" ] || [ "$file" = ".github/copilot-instructions.md" ]; then
              continue
            fi
            if grep -nEi 'TODO([ :]|$)|FIXME([ :]|$)|TBD([ :]|$)|coming soon|stub implementation|replace me|placeholder value' "$file"; then
              echo "::error file=$file::Scaffold marker found"
              found=1
            fi
          done < <(git ls-files '*.md' '*.cpp' '*.h' '*.ini' '*.yml' '*.yaml')

          if [ "$found" -ne 0 ]; then
            exit 1
          fi

  test-control-logic:
    name: Run host-side control logic tests
    runs-on: ubuntu-latest
    needs: content-guard

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install platformio

      - name: Run native control logic tests
        shell: bash
        run: pio test -e control_logic_native

  build-firmware:
    name: Build ESP32-S3 firmware
    runs-on: ubuntu-latest
    needs:
      - content-guard
      - test-control-logic

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install PlatformIO and esptool
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install platformio esptool

      - name: Resolve automatic firmware version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(python scripts/versioning.py --field version)
          LABEL=$(python scripts/versioning.py --field label)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"

      - name: Build greenhouse controller firmware
        shell: bash
        run: pio run -e greenhouse_controller

      - name: Package firmware outputs
        shell: bash
        run: |
          set -euo pipefail
          BUILD_DIR=".pio/build/greenhouse_controller"
          OUT_DIR="bundle/firmware/greenhouse-controller"
          mkdir -p "$OUT_DIR"

          cp README.md "$OUT_DIR/"
          cp platformio.ini "$OUT_DIR/"
          printf '%s\n' '${{ steps.version.outputs.version }}' > "$OUT_DIR/VERSION.txt"
          printf '%s\n' '${{ steps.version.outputs.label }}' > "$OUT_DIR/BUILD_LABEL.txt"
          cp "$BUILD_DIR/firmware.bin" "$OUT_DIR/"

          if [ -f "$BUILD_DIR/bootloader.bin" ]; then
            cp "$BUILD_DIR/bootloader.bin" "$OUT_DIR/"
          fi
          if [ -f "$BUILD_DIR/partitions.bin" ]; then
            cp "$BUILD_DIR/partitions.bin" "$OUT_DIR/"
          fi
          if [ -f "$BUILD_DIR/firmware.elf" ]; then
            cp "$BUILD_DIR/firmware.elf" "$OUT_DIR/"
          fi
          if [ -f "$BUILD_DIR/firmware.map" ]; then
            cp "$BUILD_DIR/firmware.map" "$OUT_DIR/"
          fi

          if [ -f "$BUILD_DIR/bootloader.bin" ] && [ -f "$BUILD_DIR/partitions.bin" ]; then
            python -m esptool --chip esp32s3 merge_bin \
              --output "$OUT_DIR/greenhouse-controller-merged.bin" \
              --flash_mode dio \
              --flash_size 4MB \
              0x0 "$BUILD_DIR/bootloader.bin" \
              0x8000 "$BUILD_DIR/partitions.bin" \
              0x10000 "$BUILD_DIR/firmware.bin"
          fi

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v6
        with:
          name: greenhouse-controller-firmware
          path: bundle/firmware/greenhouse-controller
          if-no-files-found: error

  bundle-docs:
    name: Bundle docs set
    runs-on: ubuntu-latest
    needs: content-guard

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Bundle docs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p bundle/docs
          cp README.md bundle/docs/
          cp -R docs bundle/docs/docs
          cp .github/copilot-instructions.md bundle/docs/
          printf '%s\n' "${GITHUB_SHA}" > bundle/docs/COMMIT.txt

      - name: Upload docs artifact
        uses: actions/upload-artifact@v6
        with:
          name: greenhouse-project-docs
          path: bundle/docs
          if-no-files-found: error

  bundle-release:
    name: Assemble release bundle
    runs-on: ubuntu-latest
    needs:
      - build-firmware
      - bundle-docs

    steps:
      - name: Download firmware artifact
        uses: actions/download-artifact@v7
        with:
          name: greenhouse-controller-firmware
          path: release-bundle/firmware/greenhouse-controller

      - name: Download docs artifact
        uses: actions/download-artifact@v7
        with:
          name: greenhouse-project-docs
          path: release-bundle/docs

      - name: Write bundle manifest
        shell: bash
        run: |
          cat > release-bundle/README.txt <<'EOF'
          Solar LoRa Greenhouse Automation build bundle

          Contents:
          - firmware/greenhouse-controller: PlatformIO ESP32-S3 firmware outputs
          - docs: project documentation snapshot at this commit

          The firmware directory contains the raw build outputs plus a merged flash image when bootloader and partitions are available.
          EOF

      - name: Upload combined release bundle
        uses: actions/upload-artifact@v6
        with:
          name: greenhouse-release-bundle-${{ github.run_number }}
          path: release-bundle
          if-no-files-found: error

  create-versioned-release:
    name: Create versioned GitHub release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - bundle-release

    steps:
      - name: Checkout repo with tags
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download release bundle
        uses: actions/download-artifact@v7
        with:
          name: greenhouse-release-bundle-${{ github.run_number }}
          path: release-bundle

      - name: Resolve automatic version tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(python scripts/versioning.py --field version)
          LABEL=$(python scripts/versioning.py --field label)
          if [ -z "$VERSION" ]; then
            echo "::error::Unable to resolve firmware version from scripts/versioning.py"
            exit 1
          fi

          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          git fetch --tags --force
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write release notes
        if: steps.version.outputs.exists != 'true'
        shell: bash
        run: |
          cat > release-notes.md <<EOF
          Automated release for Mini Greenhouse firmware ${{ steps.version.outputs.version }}.

          Source of truth:
          - include/Version.h -> series and codename
          - scripts/versioning.py -> automatic patch number and build label
          - build label -> ${{ steps.version.outputs.label }}

          Assets:
          - ESP32-S3 firmware binaries
          - merged flash image when available
          - documentation snapshot bundle

          Update the release series in include/Version.h and the matching changelog/docs entries in the same change set before merging future releases.
          EOF

      - name: Create GitHub release
        if: steps.version.outputs.exists != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          TITLE="Mini Greenhouse ${TAG}"

          ASSETS=()
          if [ -f release-bundle/firmware/greenhouse-controller/greenhouse-controller-merged.bin ]; then
            ASSETS+=("release-bundle/firmware/greenhouse-controller/greenhouse-controller-merged.bin")
          fi
          if [ -f release-bundle/firmware/greenhouse-controller/firmware.bin ]; then
            ASSETS+=("release-bundle/firmware/greenhouse-controller/firmware.bin")
          fi

          tar -czf greenhouse-docs-${{ steps.version.outputs.version }}.tar.gz -C release-bundle/docs .
          ASSETS+=("greenhouse-docs-${{ steps.version.outputs.version }}.tar.gz")

          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "$TITLE" \
            --notes-file release-notes.md \
            "${ASSETS[@]}"

