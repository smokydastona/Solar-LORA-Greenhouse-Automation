# -----------------------------------------------------------
# Deploy web flasher to GitHub Pages
#
# Always-on: deploys whenever web-flasher/ content changes on
# main, after every release, or on manual dispatch.
# Firmware binaries are downloaded from the latest release and
# served alongside the page (same origin — no CORS issues).
# -----------------------------------------------------------
name: Deploy Web Flasher

on:
  push:
    branches: [main]
    paths:
      - "web-flasher/**"
  workflow_run:
    workflows: ["Build Release Bundle"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest

    # Only deploy after a successful release (workflow_run) or on push/dispatch
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    permissions:
      pages: write
      id-token: write
      contents: read

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Download firmware from CI build artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p web-flasher/firmware

          # Determine which workflow run to pull firmware from.
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            RUN_ID="${{ github.event.workflow_run.id }}"
            echo "Using triggering workflow run: $RUN_ID"
          else
            # Manual dispatch or push — find the latest successful build.
            RUN_ID=$(gh run list \
              --repo "${{ github.repository }}" \
              --workflow "Build Release Bundle" \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId')
            echo "Using latest successful build run: $RUN_ID"
          fi

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "⚠️ No successful build run found — firmware dir will be empty"
            exit 0
          fi

          # Download individual firmware artifacts from the build run.
          TMPDIR=$(mktemp -d)
          gh run download "$RUN_ID" \
            --repo "${{ github.repository }}" \
            --name firmware-esp32-hid-host-uart \
            --dir "$TMPDIR/esp32" || true
          gh run download "$RUN_ID" \
            --repo "${{ github.repository }}" \
            --name firmware-esp32s3-usb-kbd \
            --dir "$TMPDIR/s3" || true

          # Copy merged binaries with manifest-expected names.
          [ -f "$TMPDIR/esp32/esp32-hid-host-uart-merged.bin" ] && \
            cp "$TMPDIR/esp32/esp32-hid-host-uart-merged.bin" \
               web-flasher/firmware/esp32-hid-host-uart.bin
          [ -f "$TMPDIR/s3/esp32s3-usb-kbd-merged.bin" ] && \
            cp "$TMPDIR/s3/esp32s3-usb-kbd-merged.bin" \
               web-flasher/firmware/esp32s3-usb-kbd.bin

          # Also try release assets as fallback.
          if [ ! -f web-flasher/firmware/esp32-hid-host-uart.bin ] || \
             [ ! -f web-flasher/firmware/esp32s3-usb-kbd.bin ]; then
            echo "Trying release assets as fallback…"
            gh release download --repo "${{ github.repository }}" \
              --pattern "esp32*.bin" \
              --dir web-flasher/firmware \
              --clobber 2>/dev/null || echo "⚠️ No release assets either"
          fi

          rm -rf "$TMPDIR"
          echo "--- Firmware files deployed ---"
          ls -lh web-flasher/firmware/ || true

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./web-flasher

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
